  const recentlyPlayed = [];
  const recentLimit = Math.min(20, Math.max(5, Math.floor(videos.length / 5)));

  function randomVideo() {
    const availableVideos = videos.filter(function(id) {
      return !recentlyPlayed.includes(id);
    });

    const pool = availableVideos.length > 0 ? availableVideos : videos;
    const chosen = pool[Math.floor(Math.random() * pool.length)];

    recentlyPlayed.push(chosen);

    if (recentlyPlayed.length > recentLimit) {
      recentlyPlayed.shift();
    }

    return chosen;
  }

  function makeUrl(id) {
    return `https://player.vimeo.com/video/${id}?autoplay=1&muted=1&controls=0&loop=0`;
  }

  const iframe = document.getElementById('vimeoPlayer');
  iframe.src = makeUrl(randomVideo());

  const player = new Vimeo.Player(iframe);

  player.setQuality('1080p').catch(function(error) {
    console.log('1080p not available');
  });

  player.setLoop(false);

  let changingVideo = false;

  function playNextVideo() {
    if (changingVideo) return;
    changingVideo = true;

    player.loadVideo(randomVideo()).then(function() {
      player.setLoop(false);

      player.setQuality('1080p').catch(function(error) {
        console.log('1080p not available');
      });

      player.play();
      changingVideo = false;
    });
  }

  player.on('ended', playNextVideo);

  player.on('timeupdate', function(data) {
    if (data.duration && data.seconds > data.duration - 0.25) {
      playNextVideo();
    }
  });

  player.on('pause', function() {
    setTimeout(function() {
      player.getPaused().then(function(paused) {
        if (paused && !changingVideo) {
          player.play().catch(function() {
            playNextVideo();
          });
        }
      });
    }, 1500);
  });
