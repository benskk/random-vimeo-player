<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Random Vimeo Player</title>
  <script src="https://player.vimeo.com/api/player.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage {
      width: min(90vw, 90vh);
      height: min(90vw, 90vh);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="stage">
    <iframe
      id="vimeoPlayer"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    const videos = [
      841472788,
      1028108095,
      965801362,
      1028105998,
      1000000379,
      870686677,
      841483088,
      841476209,
      820209229,
      803780448
      // add more Vimeo IDs here, separated by commas
    ];

    function randomVideo() {
      return videos[Math.floor(Math.random() * videos.length)];
    }

    function makeUrl(id) {
      return `https://player.vimeo.com/video/${id}?autoplay=1&muted=1&controls=1&loop=0`;
    }

    const iframe = document.getElementById('vimeoPlayer');
    iframe.src = makeUrl(randomVideo());

    const player = new Vimeo.Player(iframe);
    player.setLoop(false);

    let changingVideo = false;

function playNextVideo() {
  if (changingVideo) return;
  changingVideo = true;

  player.loadVideo(randomVideo()).then(function() {
    player.setLoop(false);
    player.play();
    changingVideo = false;
  });
}

player.on('ended', playNextVideo);

player.on('timeupdate', function(data) {
  if (data.duration && data.seconds > data.duration - 0.25) {
    playNextVideo();
  }
});
  </script>
</body>
</html>
