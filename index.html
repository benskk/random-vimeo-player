<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Random Vimeo Player</title>
  <script src="https://player.vimeo.com/api/player.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    .stage {
      width: min(90vw, 90vh);
      height: min(90vw, 90vh);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="stage">
    <div id="player"></div>
  </div>

  <script>
    const videos = [
      841472788,
      1028108095,
      965801362,
      1028105998,
      1000000379,
      870686677,
      841483088,
      841476209,
      820209229,
      803780448,
    ];

    function randomVideo() {
      return videos[Math.floor(Math.random() * videos.length)];
    }

    const player = new Vimeo.Player('player', {
      id: randomVideo(),
      width: 1000,
      height: 1000,
      autoplay: true,
      muted: true,
      controls: true,
      responsive: true
    });

    player.on('ended', function() {
      player.loadVideo(randomVideo()).then(function() {
        player.play();
      });
    });
  </script>
</body>
</html>
