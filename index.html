<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Random Vimeo Player</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage {
      width: min(90vw, 90vh);
      height: min(90vw, 90vh);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="stage">
    <iframe
      id="vimeoPlayer"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    const videos = [
      841476209
    ];

    function randomVideo() {
      return videos[Math.floor(Math.random() * videos.length)];
    }

    function loadRandomVideo() {
      const id = randomVideo();
      const player = document.getElementById('vimeoPlayer');
      player.src = `https://player.vimeo.com/video/${id}?autoplay=0&muted=0&controls=1`;
    }

    loadRandomVideo();
  </script>
</body>
</html>
